<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dream Destination</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('your-beach-image.jpg') no-repeat center center/cover;
      height: 100vh;
      font-family: Arial, sans-serif;
    }

    /* Top nav */
    .navbar {
      padding: 20px;
    }
    .navbar a {
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.2);
      padding: 8px 20px;
      border-radius: 20px;
      margin-right: 10px;
    }

    /* Main Heading */
    .main-text {
      color: white;
      margin-left: 5%;
      margin-top: 10%;
    }
    .main-text h1 {
      font-size: 60px;
      margin: 0;
    }
    .main-text p {
      font-size: 20px;
      font-style: italic;
    }

    /* Popup Box */
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 350px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      padding: 25px;
      color: white;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      z-index: 999;
    }

    /* Cross Button */
    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      cursor: pointer;
      color: white;
      background: none;
      border: none;
    }

    .tabs {
      display: flex;
      justify-content: space-around;
      margin-bottom: 15px;
    }
    .tabs span {
      cursor: pointer;
      padding-bottom: 5px;
    }
    .tabs .active {
      border-bottom: 2px solid white;
    }

    .popup input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.2);
      color: white;
      outline: none;
    }
    .popup input::placeholder { color: #eee; }

    .popup button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 20px;
      background: linear-gradient(90deg, #00ff88, #00cc66);
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .popup a {
      color: white;
      font-size: 12px;
      text-align: center;
      display: block;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
  </div>

  <div class="main-text">
    <h1>Dream<br>Destination</h1>
    <p>Travel with the best</p>
  </div>

  <!-- SIRF EK HI POPUP RAKHA HAI -->
  <div class="popup" id="loginPopup">
    <button class="close-btn" onclick="document.getElementById('loginPopup').style.display='none'">×</button>
    
    <div class="tabs">
      <span class="active">Log in</span>
      <span>Sign up</span>
    </div>

    <h3 style="text-align:center;">Dream Destination</h3>

    <form action="/login" method="POST">
      <input type="email" name="email" placeholder="Enter Email" required>
      <input type="password" name="password" placeholder="Enter password" required>
      <button type="submit">Log in</button>
    </form>
    <a href="/forget_pass">Forgot password?</a>
  </div>

</body>
</html>
