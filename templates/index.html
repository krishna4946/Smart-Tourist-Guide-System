<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travelista - Dream Destination</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif;}
    body {
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2070') no-repeat center/cover fixed;
      overflow-x: hidden;
    }
    .navbar {
      display: flex;
      gap: 15px;
      padding: 25px 50px;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }
    .navbar a {
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 10px 25px;
      border-radius: 25px;
      font-weight: 500;
      cursor: pointer;
    }
    .navbar a.active {background: white; color: black;}
    
    #homePage {display: block; height: 100vh; padding-top: 120px;}
    .hero-text {
      position: absolute;
      top: 30%;
      left: 8%;
      color: black; /* KAALA KIYA */
      z-index: 1;
      text-shadow: 0 0 15px rgba(255,255,255,0.6);
    }
    .hero-text h1 {font-size: 70px; line-height: 1.1; font-weight: 700;}
    .hero-text p {font-size: 22px; font-style: italic; margin-top: 10px; color: black;}

    .popup { 
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 380px; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px);
      border-radius: 20px; padding: 30px 25px; color: black; z-index: 999;
    }
    .close-btn {position: absolute; top: 12px; right: 18px; font-size: 28px; cursor: pointer; color: black; background: none; border: none;}
    .popup h3 {color: black; text-align:center; margin-bottom:20px;}

    .input-box {position: relative; margin-bottom: 15px;}
    .input-box i {position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: black;}
    .input-box input {
      width: 100%; 
      padding: 14px 14px 14px 45px; 
      border: 1px solid rgba(0,0,0,0.3); 
      border-radius: 12px; 
      background: rgba(255,255,255,0.7);
      color: black; /* INPUT TEXT KAALA */
      font-size: 16px;
    }
    .input-box input::placeholder {color: black; opacity: 0.7;} /* PLACEHOLDER KAALA */
    
    .login-btn {width: 100%; padding: 14px; border: none; border-radius: 25px; background: linear-gradient(90deg, #00ff88, #00cc66); color: black; font-weight: bold; cursor: pointer; font-size: 16px;}

    .bottom-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      color: black;
    }
    .bottom-link a {
      color: #0066cc;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }
    .forgot-link {
      text-align: right;
      margin-bottom: 15px;
      font-size: 13px;
    }
    .forgot-link a {color: #0066cc; text-decoration: none;}

    .page {display: none; min-height: 100vh; padding: 120px 8%; color: white; background: rgba(0,0,0,0.85);}
  </style>
</head>
<body>

  <div class="navbar">
    <a id="navHome" class="active" onclick="showPage('home')">Home</a>
    <a id="navAbout" onclick="showPage('about')">About</a>
    <a id="navContact" onclick="showPage('contact')">Contact</a>
  </div>

  <div id="homePage">
    <div class="hero-text">
      <h1>Dream<br>Destination</h1>
      <p>Travel with the best</p>
    </div>

    <div class="popup" id="loginPopup">
      <button class="close-btn" onclick="document.getElementById('loginPopup').style.display='none'">×</button>
      
      <!-- DEFAULT SIGNUP -->
      <div id="signupSection">
        <h3>Create Account</h3>
        <form action="/signup" method="POST">
          <div class="input-box"><i class="fa fa-user"></i><input type="text" name="name" placeholder="Enter Name" required></div>
          <div class="input-box"><i class="fa fa-envelope"></i><input type="email" name="email" placeholder="Enter Email" required></div>
          <div class="input-box"><i class="fa fa-lock"></i><input type="password" name="password" placeholder="Create password" required></div>
          <button type="submit" class="login-btn">Sign up</button>
        </form>
        <div class="bottom-link">
          Already have an account? <a onclick="showLogin()">Log in</a>
        </div>
      </div>

      <!-- HIDDEN LOGIN -->
      <div id="loginSection" style="display:none;">
        <h3>Log In</h3>
        <form action="/login" method="POST">
          <div class="input-box"><i class="fa fa-user"></i><input type="email" name="email" placeholder="Enter Email" required></div>
          <div class="input-box"><i class="fa fa-lock"></i><input type="password" name="password" placeholder="Enter password" required></div>
          <div class="forgot-link">
            <a href="/forgot-password">Forgot Password?</a> <!-- FORGOT PASSWORD ADD KIYA -->
          </div>
          <button type="submit" class="login-btn">Log in</button>
        </form>
        <div class="bottom-link">
          Don't have an account? <a onclick="showSignup()">Sign up</a>
        </div>
      </div>

    </div>
  </div>

  <div class="page" id="aboutPage"><h2>About Us</h2><p>Welcome to Travelista</p></div>
  <div class="page" id="contactPage"><h2>Contact Us</h2><p>+91 89841 66820</p></div>

  <script>
    function showPage(page) {
      document.getElementById('homePage').style.display = 'none';
      document.getElementById('aboutPage').style.display = 'none';
      document.getElementById('contactPage').style.display = 'none';
      document.getElementById('navHome').classList.remove('active');
      document.getElementById('navAbout').classList.remove('active');
      document.getElementById('navContact').classList.remove('active');

      if(page === 'home') {
        document.getElementById('homePage').style.display = 'block';
        document.getElementById('navHome').classList.add('active');
      }
      if(page === 'about') {
        document.getElementById('aboutPage').style.display = 'block';
        document.getElementById('navAbout').classList.add('active');
      }
      if(page === 'contact') {
        document.getElementById('contactPage').style.display = 'block';
        document.getElementById('navContact').classList.add('active');
      }
    }

    function showLogin() {
      document.getElementById('signupSection').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
    }
    function showSignup() {
      document.getElementById('loginSection').style.display = 'none';
      document.getElementById('signupSection').style.display = 'block';
    }
  </script>
</body>
</html>
