<!DOCTYPE html>
<html>
<head>
    <title>Smart Tourist Guide</title>
    <style>
        body { font-family: Arial; padding: 20px; background: white; }
        input, button { padding: 10px; font-size: 16px; }
        img { margin-top: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Smart Tourist Guide - Bhubaneswar</h1>
    
    <form method="POST">
        <input type="text" name="place_name" placeholder="Enter place name" required>
        <button type="submit">Search</button>
    </form>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    {% if place %}
        <h2>{{ place.name }}</h2>
        <p>{{ place.desc }}</p>
    {% endif %}

    {% if image %}
        <img src="{{ image }}" alt="{{ place.name }}" style="width:100%; max-width:600px;">
    {% elif place %}
        <p>No image found</p>
    {% endif %}

</body>
</html>
