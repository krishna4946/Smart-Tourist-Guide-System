<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travelista - Dream Destination</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2070') no-repeat center center/cover;
      height: 100vh;
      overflow: hidden;
    }

    /* Navbar */
    .navbar {
      display: flex;
      gap: 15px;
      padding: 25px 50px;
    }
    .navbar a {
      text-decoration: none;
      color: white;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 10px 25px;
      border-radius: 25px;
      font-weight: 500;
    }

    /* Main Text */
    .hero-text {
      position: absolute;
      top: 30%;
      left: 8%;
      color: white;
    }
    .hero-text h1 {
      font-size: 70px;
      line-height: 1.1;
      font-weight: 700;
    }
    .hero-text p {
      font-size: 22px;
      font-style: italic;
      margin-top: 10px;
    }

    /* Popup Login Box */
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 380px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 30px 25px;
      color: white;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
      z-index: 999;
    }

    /* Cross Button */
    .close-btn {
      position: absolute;
      top: 12px;
      right: 18px;
      font-size: 28px;
      cursor: pointer;
      color: white;
      background: none;
      border: none;
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }
    .tabs span {
      cursor: pointer;
      padding-bottom: 10px;
      font-size: 18px;
      font-weight: 500;
    }
    .tabs .active {
      border-bottom: 3px solid white;
    }

    .popup h3 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 25px;
    }

    .input-box {
      position: relative;
      margin-bottom: 15px;
    }
    .input-box i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #ddd;
    }
    .input-box input {
      width: 100%;
      padding: 14px 14px 14px 45px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 15px;
      outline: none;
    }
    .input-box input::placeholder { color: #eee; }

    .login-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(90deg, #00ff88, #00cc66);
      color: black;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
    .forgot {
      color: white;
      font-size: 13px;
      text-align: center;
      display: block;
      margin-top: 15px;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
  </div>

  <div class="hero-text">
    <h1>Dream<br>Destination</h1>
    <p>Travel with the best</p>
  </div>

  <!-- SIRF EK HI LOGIN POPUP -->
  <div class="popup" id="loginPopup">
    <button class="close-btn" onclick="document.getElementById('loginPopup').style.display='none'">×</button>
    
    <div class="tabs">
      <span class="active">Log in</span>
      <span>Sign up</span>
    </div>

    <h3>Dream Destination</h3>

    <form action="/login" method="POST">
      <div class="input-box">
        <i class="fa fa-user"></i>
        <input type="email" name="email" placeholder="Enter Email" required>
      </div>
      <div class="input-box">
        <i class="fa fa-lock"></i>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button type="submit" class="login-btn">Log in</button>
    </form>
    <a href="/forget_pass" class="forgot">Forgot password?</a>
  </div>

</body>
</html>
